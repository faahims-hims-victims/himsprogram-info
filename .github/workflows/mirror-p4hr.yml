name: Mirror P4HR Site

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      
      - name: Install system Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
      
      - name: Fetch favicons
        run: node scripts/fetch-favicon.js
        continue-on-error: true
      
      - name: Mirror site
        run: node scripts/mirror-p4hr.js
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      
      - name: Generate SEO
        run: node scripts/generate-seo.js
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
      
      - name: Verify build
        run: |
          echo "=== Build Verification ==="
          ls -lh *.html 2>/dev/null | head -5
          echo ""
          echo "=== SEO Files ==="
          ls -lh sitemap.xml robots.txt feed.xml 2>/dev/null
      
      - name: Commit and push changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Mirror update: Build #${{ github.run_number }} - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
